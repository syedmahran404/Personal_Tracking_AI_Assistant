# Personal Tracking AI Assistant — full local stack
#
# Brings up: PostgreSQL, Redis, FastAPI backend, Next.js frontend, Nginx.
# Production deployment can reuse the same images with a different
# .env and (e.g.) a managed Postgres.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ptaa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ptaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ptaa_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ptaa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ptaa} -d ${POSTGRES_DB:-ptaa}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ptaa-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ptaa-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ptaa}:${POSTGRES_PASSWORD:-ptaa_dev_password}@postgres:5432/${POSTGRES_DB:-ptaa}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-ptaa}:${POSTGRES_PASSWORD:-ptaa_dev_password}@postgres:5432/${POSTGRES_DB:-ptaa}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://localhost"]'
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: ptaa-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: ptaa-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    profiles: ["proxy"]   # opt-in: `docker compose --profile proxy up`

volumes:
  postgres-data:
  redis-data:
