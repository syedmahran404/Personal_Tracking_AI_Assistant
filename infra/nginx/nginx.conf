# Production-style reverse proxy for PTAA.
# Routes /api/* to FastAPI and everything else to Next.js.
# Terminates HTTP only — TLS termination is the responsibility of the
# upstream load balancer (or replace with certbot config for self-host).

worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;
    client_max_body_size 10m;

    # Compression
    gzip on;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml;

    # Common security headers
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http: https: ws: wss:; font-src 'self' data:; frame-ancestors 'none';";
    }

    upstream ptaa_api { server api:8000; }
    upstream ptaa_web { server web:3000; }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy $csp_header always;

        # API
        location /api/ {
            proxy_pass http://ptaa_api/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # WebSocket
        location /api/v1/ws {
            proxy_pass http://ptaa_api/v1/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
        }

        # Health passthrough
        location = /health {
            proxy_pass http://ptaa_api/health;
        }

        # Frontend (default)
        location / {
            proxy_pass http://ptaa_web;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }
    }
}
